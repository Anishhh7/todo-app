<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="toast-container" class="toast-container"></div>

    <div class="app-container">
      <header class="app-header">
        <h1>Todo App</h1>
        <p id="current-date"></p>
      </header>

      <main class="todo-card">
        <div class="input-section">
          <input
            type="text"
            id="task-input"
            placeholder="Create your task..."
            autocomplete="off"
          />
          <button id="add-btn">Add</button>
        </div>

        <div id="search-container" class="search-section hidden">
          <input type="text" id="search-input" placeholder="Search tasks..." />
        </div>

        <div class="controls-row">
          <span id="task-count">0 tasks</span>
          <button id="delete-all-btn" class="hidden">Delete all</button>
        </div>

        <ul id="task-list"></ul>
      </main>

      <div class="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text">Backend connected</span>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
