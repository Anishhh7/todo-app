<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow - Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-screen">
      <div class="auth-box">
        <div class="auth-header">
          <h1>TaskFlow</h1>
          <p id="authTitle">Sign in to your account</p>
        </div>

        <div id="authError" class="error"></div>
        <div id="authSuccess" class="success"></div>

        <form id="authForm">
          <div id="nameGroup" class="form-group" style="display: none">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Your name" />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="your@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>

          <div id="confirmGroup" class="form-group" style="display: none">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" placeholder="••••••••" />
          </div>

          <button type="submit" class="btn btn-primary" id="authSubmit">
            Sign In
          </button>
        </form>

        <div class="auth-toggle">
          <span id="toggleText">Don't have an account?</span>
          <button type="button" id="toggleAuth">Sign Up</button>
        </div>
      </div>
    </div>

    <!-- APP SCREEN -->
    <div id="appScreen" class="app-screen hidden">
      <!-- Header -->
      <div class="app-header">
        <h1>TaskFlow</h1>
        <div class="header-actions">
          <button class="dark-toggle" id="darkToggle">🌙</button>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="app-main">
        <!-- Quick Add -->
        <div class="quick-add">
          <button class="quick-add-btn active" data-type="task">✓ Task</button>
          <button class="quick-add-btn" data-type="note">📝 Note</button>
        </div>

        <!-- Input -->
        <div class="input-section">
          <input
            type="text"
            id="quickInput"
            class="quick-input"
            placeholder="Add a task..."
            autocomplete="off"
          />
          <button class="add-quick-btn" id="addQuickBtn">Add</button>
        </div>

        <!-- Filters -->
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="task">Tasks</button>
          <button class="filter-btn" data-filter="note">Notes</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Done</button>
        </div>

        <!-- Tasks -->
        <div class="tasks-container" id="tasksList">
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <h3>No tasks yet</h3>
            <p>Add your first task to get started</p>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
